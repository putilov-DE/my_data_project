version: "3.8"
services:
  cassandra:
    image: cassandra:latest
    container_name: cassandra_node
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=AdTechCluster
      - CASSANDRA_DC=DC1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
    volumes:
      - ./cassandra_data:/var/lib/cassandra
    restart: always
