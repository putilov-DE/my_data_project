version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    container_name: adtech_redis


  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    container_name: adtech_api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload